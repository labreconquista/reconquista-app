        .auth-form input {

            margin-bottom: 12px;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            font-size: 14px;

        .auth-btn {

            border: none;
            border-radius: 6px;
            font-weight: 600;

            font-size: 14px;

        .auth-btn:hover {

        .auth-error {

        let proveedorSeleccionado = null;

        let autenticado = false;

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === CREDENTIALS.username && password === CREDENTIALS.password) {
                autenticado = true;
                localStorage.setItem('reconquista_auth', 'true');
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                init();
            } else {
                document.getElementById('authError').textContent = 'Usuario o contraseña incorrectos';
                document.getElementById('authError').classList.remove('hidden');
            }
        }

        function handleLogout() {
            autenticado = false;
            localStorage.removeItem('reconquista_auth');
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('appContainer').classList.add('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('authError').classList.add('hidden');
        }

        function checkAuth() {
            if (localStorage.getItem('reconquista_auth') === 'true') {
                autenticado = true;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                init();
            }
        }

        function init() {
            console.log(`✅ ${proveedores.length} proveedores cargados localmente`);
            renderProveedores();
            document.getElementById('searchBox').addEventListener('input', filtrarProveedores);
        }

        function renderProveedores() {
            const list = document.getElementById('proveedorList');
            const search = document.getElementById('searchBox').value.toLowerCase();

            list.innerHTML = proveedores
                .filter(p => p.nombre.toLowerCase().includes(search) || p.rubro.toLowerCase().includes(search))
                .map(p => `
                    <div class="proveedor-item ${proveedorSeleccionado?.id === p.id ? 'active' : ''}"
                         onclick="seleccionarProveedor(${p.id})">
                        <div class="proveedor-nombre">${p.nombre}</div>
                        <div class="proveedor-rubro">${p.rubro}</div>
                    </div>
                `)
                .join('');
        }

        function filtrarProveedores() {
            renderProveedores();
        }

        function seleccionarProveedor(id) {
            proveedorSeleccionado = proveedores.find(p => p.id === id);
            productosSeleccionados[id] = productosSeleccionados[id] || [];
            renderProveedores();
            renderProveedor();
        }

        function renderProveedor() {
            if (!proveedorSeleccionado) return;

            const p = proveedorSeleccionado;
            const seleccionados = productosSeleccionados[p.id] || [];

            const htmlProductos = p.productos.map((producto, idx) => `

                    <input type="checkbox"
                           value="${idx}"
                           ${seleccionados.includes(idx) ? 'checked' : ''}
                           onchange="toggleProducto(${p.id}, ${idx})">
                    <div class="producto-info">
                        <div class="producto-nombre">${producto}</div>
                    </div>
                </label>
            `).join('');

            const htmlContacto = `
                <div class="contacto-section">
                    <div class="contacto-item">
                        <span class="contacto-label">Contacto:</span>
                        <span class="contacto-valor">${p.persona}</span>
                    </div>
                    ${p.tel ? `<div class="contacto-item">
                        <span class="contacto-label">Teléfono:</span>
                        <span class="contacto-valor">${p.tel}</span>
                    </div>` : ''}
                    ${p.tel_celular ? `<div class="contacto-item">
                        <span class="contacto-label">Celular:</span>
                        <span class="contacto-valor">${p.tel_celular}</span>
                    </div>` : ''}
                    ${p.email ? `<div class="contacto-item">
                        <span class="contacto-label">Email:</span>
                        <span class="contacto-valor">${p.email}</span>
                    </div>` : ''}
                </div>
            `;

            const whatsappNum = p.wa || null;

            const esDisponible = seleccionados.length > 0;

            document.getElementById('mainContent').innerHTML = `
                <div class="header">
                    <h1>${p.nombre}</h1>
                    <p>${p.rubro}</p>
                </div>

                ${htmlContacto}

                <div class="info-entrega">
                    <strong>📍 Entregas:</strong> Lunes a Jueves de 10 a 15hs<br>
                    <strong>📍 Dirección:</strong> Palpa 3554, CABA
                </div>

                <div class="productos-section">
                    <h3>Selecciona los productos que necesitas:</h3>
                    <div class="producto-list">
                        ${htmlProductos}
                    </div>
                </div>

                ${esDisponible ? `
                    <div class="mensaje-preview" id="preview"></div>
                    <div class="acciones">
                        ${whatsappNum ? `<button class="btn btn-whatsapp" onclick="enviarWhatsapp(${p.id}, '${whatsappNum}')">
                            💬 WhatsApp
                        </button>` : ''}
                        <button class="btn btn-email" onclick="enviarEmail(${p.id}, '${p.email}')">
                            📧 Email
                        </button>
                    </div>
                ` : ''}
            `;

            if (esDisponible) {
                actualizarPreview();
            }
        }

        function toggleProducto(id, idx) {
            if (!productosSeleccionados[id]) {
                productosSeleccionados[id] = [];
            }

            if (productosSeleccionados[id].includes(idx)) {
                productosSeleccionados[id] = productosSeleccionados[id].filter(i => i !== idx);
            } else {
                productosSeleccionados[id].push(idx);
            }

            renderProveedor();
        }

        function actualizarPreview() {
            const p = proveedorSeleccionado;
            const seleccionados = productosSeleccionados[p.id] || [];

            const items = seleccionados.map(idx => `• ${p.productos[idx]}`).join('\n');

            const mensaje = `Hola ${p.nombre},

Te envío los productos que necesito para la próxima entrega:

${items}

Entrega: Lunes a Jueves de 10 a 15hs en Palpa 3554, CABA

Gracias`;

            document.getElementById('preview').textContent = mensaje;
        }

        function enviarWhatsapp(id, numero) {
            const p = proveedorSeleccionado;
            const seleccionados = productosSeleccionados[id] || [];

            const items = seleccionados.map(idx => `• ${p.productos[idx]}`).join('\n');

            const mensaje = `Hola ${p.nombre},

Te envío los productos que necesito para la próxima entrega:

${items}

Entrega: Lunes a Jueves de 10 a 15hs en Palpa 3554, CABA

Gracias`;

            const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        function enviarEmail(id, email) {
            const p = proveedorSeleccionado;
            const seleccionados = productosSeleccionados[id] || [];

            const items = seleccionados.map(idx => `• ${p.productos[idx]}`).join('\n');

            const asunto = `Pedido de productos - ${p.nombre}`;
            const cuerpo = `Hola ${p.nombre},

Te envío los productos que necesito para la próxima entrega:

${items}

Entrega: Lunes a Jueves de 10 a 15hs en Palpa 3554, CABA

Gracias`;

            const url = `mailto:${email}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`;
            window.open(url, '_blank');
        }

        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }

        // Verificar autenticación al cargar
        checkAuth();
    </script>
</body>
</html>
